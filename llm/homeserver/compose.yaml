services:

  # ── nginx — public-facing reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: zafira-dtc-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro     # certbot certificates
      - certbot-www:/var/www/certbot:ro # ACME challenge webroot
    networks:
      - proxy

  # ── certbot — automatic TLS certificate renewal ────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: zafira-certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Run renewal check every 12 h; exit 0 if nothing to renew
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 43200 & wait;
             done"
    networks:
      - proxy

volumes:
  certbot-www:

networks:
  proxy:
    driver: bridge
