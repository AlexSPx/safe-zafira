# nginx.conf — Safe Zafira DTC proxy (homeserver)
#
# Proxies  /api/dtc/  →  MacBook DTC LLM service over WireGuard
#
# Replace every <PLACEHOLDER> before deploying:
#   <YOUR_DOMAIN>    your public domain, e.g. zafira.example.com
#   <MACBOOK_WG_IP>  MacBook's WireGuard IP,  e.g. 10.8.0.2
#   <DTC_LLM_PORT>   port the MacBook service listens on (default 8090)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    # ── Basic hardening ───────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 16k;       # DTC requests are tiny

    # ── Rate limiting — prevent abuse ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=dtc:10m rate=10r/m;

    # ── Upstream — MacBook over WireGuard ─────────────────────────────────────
    upstream dtc_llm {
        server <MACBOOK_WG_IP>:<DTC_LLM_PORT>;
        keepalive 4;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name <YOUR_DOMAIN>;

        # ACME challenge for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — public entrypoint ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name <YOUR_DOMAIN>;

        ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY       always;

        # ── DTC LLM proxy ─────────────────────────────────────────────────────
        location /api/dtc/ {
            # Rate limit: 10 requests/min per IP, burst of 3
            limit_req zone=dtc burst=3 nodelay;

            # Strip the /api/dtc prefix so the backend sees /dtc/...
            rewrite ^/api/dtc(/.*)$ $1 break;

            proxy_pass         http://dtc_llm;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Pass the API key from the homeserver's env to the MacBook service.
            # Set DTC_API_KEY env var on the homeserver and reference it here,
            # or inject it via the nginx.conf directly for simplicity:
            proxy_set_header   X-API-Key         $http_x_api_key;

            proxy_read_timeout 60s;  # LLM inference can take a few seconds
            proxy_send_timeout 10s;
        }

        # ── Health probe (no auth required) ───────────────────────────────────
        location /api/dtc/health {
            limit_req zone=dtc burst=5 nodelay;
            rewrite ^/api/dtc(/.*)$ $1 break;
            proxy_pass http://dtc_llm;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Block everything else on this vhost ───────────────────────────────
        location / {
            return 404;
        }
    }
}
