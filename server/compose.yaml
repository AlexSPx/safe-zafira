version: '3.8'

services:
  postgres:
    image: 'postgres:15'
    environment:
      - POSTGRES_DB=zafira_db
      - POSTGRES_USER=zafira
      - POSTGRES_PASSWORD=zafira
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zafira -d zafira_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - '4448:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/zafira_db
      - SPRING_DATASOURCE_USERNAME=zafira
      - SPRING_DATASOURCE_PASSWORD=zafira
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pgdata: